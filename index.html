<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Square Collector</title>
<style>
body {
    margin: 0;
    text-align: center;
    font-family: Arial, sans-serif;
}

canvas {
    border: 2px solid black;
    background: white;
    margin-top: 20px;
}
</style>
</head>
<body>

<h2>Score: <span id="score">0</span></h2>
<canvas id="game" width="800" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const player = {
    x: 100,
    y: 100,
    size: 20,
    speed: 5
};

const point = {
    x: 200,
    y: 200,
    size: 15
};

let score = 0;
const keys = {};

document.addEventListener("keydown", e => {
    keys[e.key] = true;
});

document.addEventListener("keyup", e => {
    keys[e.key] = false;
});

function spawnPoint() {
    point.x = Math.random() * (canvas.width - point.size);
    point.y = Math.random() * (canvas.height - point.size);
}

function update() {
    if (keys["ArrowUp"]) player.y -= player.speed;
    if (keys["ArrowDown"]) player.y += player.speed;
    if (keys["ArrowLeft"]) player.x -= player.speed;
    if (keys["ArrowRight"]) player.x += player.speed;

    player.x = Math.max(0, Math.min(canvas.width - player.size, player.x));
    player.y = Math.max(0, Math.min(canvas.height - player.size, player.y));

    if (
        player.x < point.x + point.size &&
        player.x + player.size > point.x &&
        player.y < point.y + point.size &&
        player.y + player.size > point.y
    ) {
        score++;
        document.getElementById("score").textContent = score;
        spawnPoint();
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Player (black square)
    ctx.fillStyle = "black";
    ctx.fillRect(player.x, player.y, player.size, player.size);

    // Point (red square)
    ctx.fillStyle = "red";
    ctx.fillRect(point.x, point.y, point.size, point.size);
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

spawnPoint();
gameLoop();
</script>

</body>
</html>
